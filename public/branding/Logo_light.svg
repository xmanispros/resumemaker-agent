<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" id="ResumeMakerAgentDark" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 512 512" style="enable-background:new 0 0 512 512;" xml:space="preserve">
<style type="text/css">
	.bg-dark { fill: url(#dark_bg); }
	.brand-white { fill: #FFFFFF; }
	.brand-accent { fill: #2DD4BF; }
	.text-main { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-weight: 700; font-size: 34px; letter-spacing: 1px; }
	.text-sub { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 4px; opacity: 0.85; }
</style>
<defs>
	<linearGradient id="dark_bg" gradientUnits="userSpaceOnUse" x1="0" y1="512" x2="512" y2="0">
		<stop offset="0%" stop-color="#0F172A"/>
		<stop offset="60%" stop-color="#1E293B"/>
		<stop offset="100%" stop-color="#0EA5E9"/>
	</linearGradient>
	<linearGradient id="icon_grad_dark" gradientUnits="userSpaceOnUse" x1="200" y1="280" x2="312" y2="130">
		<stop offset="0%" stop-color="#38BDF8"/>
		<stop offset="100%" stop-color="#2DD4BF"/>
	</linearGradient>
</defs>

<rect width="100%" height="100%" class="bg-dark" rx="110"/>

<g transform="translate(0, -15)">
	<!-- File Icon Component -->
	<g transform="translate(196, 120)">
		<path d="M10,0 L80,0 L120,40 L120,150 C120,158.3 113.3,165 105,165 L10,165 C1.7,165 0,158.3 0,150 L0,15 C0,6.7 6.7,0 10,0 Z" fill="#090D16" opacity="0.4" transform="translate(4, 6)"/>
		<path d="M10,0 L80,0 L120,40 L120,150 C120,158.3 113.3,165 105,165 L10,165 C1.7,165 0,158.3 0,150 L0,15 C0,6.7 6.7,0 10,0 Z" fill="url(#icon_grad_dark)"/>
		<path d="M80,0 L80,30 C80,35.5 84.5,40 90,40 L120,40 Z" fill="#FFFFFF" opacity="0.9"/>
		<rect x="25" y="65" width="70" height="10" rx="5" class="brand-white" opacity="0.9"/>
		<rect x="25" y="90" width="70" height="10" rx="5" class="brand-white" opacity="0.9"/>
		<rect x="25" y="115" width="45" height="10" rx="5" class="brand-white" opacity="0.9"/>
	</g>

