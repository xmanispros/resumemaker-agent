<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F6E5D"/>
      <stop offset="100%" style="stop-color:#0A4F42"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ba4f0"/>
      <stop offset="100%" style="stop-color:#1a8fe0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="150" cy="550" r="150" fill="rgba(255,255,255,0.04)"/>
  <circle cx="900" cy="500" r="120" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Logo icon -->
  <rect x="80" y="200" width="100" height="100" rx="20" fill="url(#accent)"/>
  <text x="130" y="268" font-family="monospace, sans-serif" font-size="52" font-weight="bold" fill="#FAF8F3" text-anchor="middle">R</text>
  
  <!-- Site name -->
  <text x="210" y="245" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF">ResumeMaker</text>
  <text x="210" y="295" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="56" font-weight="700" fill="#2ba4f0">Agent</text>
  
  <!-- Tagline -->
  <text x="80" y="380" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)">Free Online Resume Builder</text>
  
  <!-- Feature pills -->
  <rect x="80" y="420" width="220" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="190" y="448" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">90+ Templates</text>
  
  <rect x="320" y="420" width="200" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="420" y="448" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Free PDF Download</text>
  
  <rect x="540" y="420" width="240" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="660" y="448" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">No Payment Required</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.15)"/>
  <text x="600" y="616" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">resumemakeragent.com</text>
</svg>